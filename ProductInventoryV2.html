<!DOCTYPE html>
<html>

<head>
    <title> Product Inventory</title>

    <style>
        label,
        input,
        select {
            height: 30px;
        }

        input {
            padding-left: 5px;
        }

        #button-container {
            margin-top: 20px;
            margin-left: 50px;
        }

        button {
            width: 70px;
            height: 30px;
            margin-left: 20px;
            color: white;
            border-radius: 5px;
        }

        #btn-add {
            background-color: rgb(43, 43, 228);
        }

        #btn-update {
            background-color: rgb(43, 43, 228);
        }

        #btn-clear {
            background-color: rgb(43, 43, 228);
        }

        .btn-delete {
            background-color: red;
        }

        .btn-edit {
            background-color: rgb(43, 43, 228);
        }

        #table-container {
            padding-top: 20px;
        }

        table {
            width: 100%;
        }

        table thead tr th {
            background-color: rgb(228, 169, 58);
            color: white;
            height: 50px;
        }

        table tbody tr {
            height: 30px;
            cursor: pointer;
        }

        table tbody tr:nth-child(odd) {
            background-color: lightgray;
        }

        table tbody tr:hover {
            background-color: rgb(86, 86, 218);
        }

        .action-column {
            text-align: center;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 2fr 1fr 2fr 1fr 2fr;
            gap: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>Product Inventory</h1>
    <fieldset>
        <legend>Product Information</legend>
        <div class="form-row">

            <label>ID</label>
            <input id="product-id" disabled>

            <label>Code</label>
            <input id="product-code">

            <label>Barcode</label>
            <input id="product-barcode">

            <label>Name</label>
            <input id="product-name">

        </div>

        <div class="form-row">

            <label>Category</label>
            <select id="category">
                <option value="0">Select</option>
                <option value="1"> Beverages </option>
                <option value="2"> Snacks </option>
                <option value="3"> Dairy </option>
                <option value="4"> Bakery </option>
                <option value="5"> Cosmetics </option>
                <option value="6"> Medicine </option>
            </select>

            <label>Supplier</label>
            <input id="supplier">

            <label>Expiry Date</label>
            <input id="expiry-date" type="date">

            <label>Status</label>
            <select id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>
    </fieldset>

    <fieldset>
        <legend>Pricing Information</legend>
        <div class="form-row">

            <label>Cost Price</label>
            <input id="cost-price">

            <label>Selling Price</label>
            <input id="selling-price">

        </div>
    </fieldset>


    <fieldset>
        <legend>Inventory Details</legend>
        <div class="form-row">

            <label>Quantity</label>
            <input id="quantity">

            <label>Unit of Measure</label>
            <select id="unit-of-measure">
                <option value="Piece">Piece</option>
                <option value="Kilogram">Kilogram</option>
                <option value="Liter">Liter</option>
                <option value="Pack">Pack</option>
                <option value="Box">Box</option>
            </select>

        </div>
    </fieldset>

    <div id="button-container">
        <button id="btn-add"> Add </button>
        <button id="btn-update" onclick="updateProduct()"> Update </button>
        <button id="btn-clear"> Clear </button>
    </div>

    <div id="table-container">
        <table id="product-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Unit Price</th>
                    <th>Quantity</th>
                    <th>#</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
    </div>


    <script>

        let productId = 1;

        let products = []; //length = 0


        document.getElementById("btn-add").addEventListener("click", addProduct);
        document.getElementById("btn-clear").addEventListener("click", clearProduct);
        

        //Implement a function to delete product from products array and show in table
        function deleteProduct( productId ) {

            if (productId === "") {
                alert("Please, enter product id to delete!");
                return; //exit
            }

            //Find index of product in products array
            let index = products.findIndex(product => product.id == productId);

            if (index === -1) {
                alert("Product not found!");
                return; //exit
            }

            //Remove product from products array
            products.splice(index, 1);

            showProducts(); //function call to show products in table

            clearProduct(); //function call to clear input fields
        }
        

        

        function addProduct() {
            let productCode = document.getElementById("product-code").value;
            let barcode = document.getElementById("product-barcode").value;
            let productName = document.getElementById("product-name").value;

            let categoryId = document.getElementById("category").value;// 1,2,3,4,5,6
            let supplier = document.getElementById("supplier").value;
            let expiryDate = document.getElementById("expiry-date").value;
            let status = document.getElementById("status").value;

            let costPrice = document.getElementById("cost-price").value;
            let sellingPrice = document.getElementById("selling-price").value;

            let quantity = document.getElementById("quantity").value;
            let unitOfMeasure = document.getElementById("unit-of-measure").value;


            if(productCode === "" || barcode === "" || productName === ""){

                alert("Please, fill the required fields!");

                return; //exit
            }

            if(categoryId === "0"){
                alert("Choose category");

                return; //exit
            }

            if(expiryDate === ""){
                alert("Choose Expiry Date");

                return; //exit
            }

            if(costPrice === ""){
                alert("Enter cost price");

                return; //exit
            }

            if( isNaN(costPrice) ){
                alert("Invalid cost price");
                return;
            }

            if(sellingPrice === ""){
                alert("Enter selling price");

                return; //exit
            }

            if( isNaN(sellingPrice) ){
                alert("Invalid selling price");
                return;
            }



            //Add variables to product object
            let product = {
                id: productId,
                code: productCode,
                barcode: barcode,
                name: productName,
                categoryId: categoryId,
                supplier: supplier,
                expiryDate: expiryDate,
                status: status,
                costPrice: costPrice,
                sellingPrice: sellingPrice,
                quantity: quantity,
                unitOfMeasure: unitOfMeasure
            };

            products[products.length] = product;

            productId++;

            showProducts(); //function call to show products in table
        }

        //Name function to show products in table
        //Use for loop to loop through products array and show in table
        function showProducts() {

            let tableBody = document.getElementById("table-body");

            tableBody.innerHTML = ""; //Clear table body before showing products

            for (let i = 0; i < products.length; i++) {
                let product = products[i];
                let row = `<tr>
                    <td>${product.id}</td>
                    <td>${product.code}</td>
                    <td>${product.name}</td>
                    <td>${product.sellingPrice}</td>
                    <td>${product.quantity} </td>
                    <td class="action-column">
                        <button class="btn-edit">Edit</button>
                        <button class="btn-delete">Delete</button>
                    </td>
                </tr>`;

                tableBody.innerHTML += row;

            }

            //Add event listener to delete buttons
            //Pass product id to deleteProduct function
            let deleteButtons = document.getElementsByClassName("btn-delete");
            for (let i = 0; i < deleteButtons.length; i++) {
                deleteButtons[i].addEventListener("click", function() {
                    let productId = products[i].id;
                    deleteProduct(productId);
                });
            }


        }


        function clearProduct() {
            document.getElementById("product-id").value = "";
            document.getElementById("product-code").value = "";
            document.getElementById("product-barcode").value = "";
            document.getElementById("product-name").value = "";
            document.getElementById("category").selectedIndex = 0; //Select first option
            document.getElementById("supplier").value = "";
            document.getElementById("expiry-date").value = "";
            document.getElementById("status").selectedIndex = 0; //Select first option
            document.getElementById("cost-price").value = "";
            document.getElementById("selling-price").value = "";
            document.getElementById("quantity").value = "";
            document.getElementById("unit-of-measure").value = "Piece";
        }

    </script>
</body>

</html>
