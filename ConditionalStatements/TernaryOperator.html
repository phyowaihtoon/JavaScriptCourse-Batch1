<script>

    let age = 30;
    if(age < 30){
        console.log("You are young");
    } else {
        console.log("You are old");
    }


    console.log(".............. Using Ternary Operator..............");

    //Ternary operator
    let age2 = 25;
    let result = age2 < 30 && age2 >25 ? "You are young" : "You are old";
    console.log(result);



</script>
