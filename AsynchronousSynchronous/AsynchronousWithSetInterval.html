<!DOCTYPE html>
<html>

<head>
    <title>Asynchronous</title>
</head>

<body>

    <label>Count : </label>
    <label id="count"></label>

    <button id="btn-start">Start</button>
    <button id="btn-end">End</button>

    <script>

        let count = 0;

        document.getElementById("btn-start").addEventListener("click", startCount);
        document.getElementById("btn-end").addEventListener("click", endCount);

        let uniqueIDStartCounter; 

        function startCount() {

            uniqueIDStartCounter = setInterval(() => {
                count++;
                document.getElementById("count").innerText = count;
            }, 500);

            

        }

        function endCount() {
            clearInterval(uniqueIDStartCounter);
        }

    </script>
</body>



</html>
