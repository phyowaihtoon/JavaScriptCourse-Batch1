<script>

    let marks1 = [80, 90, 70];  
    // Stack Memory - marks1 = #1234
    // Heap Memory - [80, 90, 70]

    let marks2 = marks1; 

    marks2[0] = 100;

    console.log(marks1); // [100, 90, 70]
    console.log(marks2); // [100, 90, 70]


    let num1 = 10;

    let num2 = num1; 

    num2 = 20;

    console.log(num1); // 10
    console.log(num2); // 20

</script>
