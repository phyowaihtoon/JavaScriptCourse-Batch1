<!DOCTYPE html>
<html>
    <head>
        <title>Multiple Class</title>
        <style>

            .my-border {
                border: 3px solid yellow;
            }

            .my-height {
                height: 300px;
            }

            .my-background {
                background-color: gray;
            }

        </style>
    </head>
    <body>
        <!-- let class = ["my-border","my-height", "my-background"] -->
        <!-- JS can change HTML and CSS dyanmically-->

        <div id="myHello" class="my-border"> 
            Hello
        </div>

        <button onclick="addHeight()">Add Height</button>
        <button onclick="removeHeight()">Remove Height</button>
        <button onclick="sayHello()">Click Hello</button>


    </body>

    <script>

        function sayHello(){

          document.getElementById("myHello").classList.remove("my-background");

          /*
          let myClassList = document.getElementById("myHello").classList.value;


          console.log("Class List :", myClassList);
          */
        
        }

        function addHeight(){
            document.getElementById("myHello").classList.add("my-height");
            document.getElementById("myHello").classList.add("my-background");
        }

        function removeHeight(){
            document.getElementById("myHello").classList.remove("my-height");
            document.getElementById("myHello").classList.remove("my-background");
        }


    </script>
</html>
