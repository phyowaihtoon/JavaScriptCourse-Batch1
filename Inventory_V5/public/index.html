<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product inventory</title>
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div id="app-setup-banner" class="alert alert--warning" hidden></div>

    <header class="app-header" id="app-header" hidden>
      <h1>Product inventory</h1>
      <div class="app-header__user">
        <span id="header-email" class="text-muted"></span>
        <button type="button" class="btn btn--ghost btn--sm" id="btn-sign-out">
          Sign out
        </button>
      </div>
    </header>

    <main class="app-main">
      <!-- Auth -->
      <section id="view-auth" class="panel panel--narrow" hidden>
        <h2 id="auth-visible-title" style="margin-top: 0; font-size: 1.25rem">Sign in</h2>
        <div id="auth-alert" class="alert alert--error" hidden role="alert"></div>
        <div id="auth-success" class="alert alert--success" hidden role="status"></div>

        <form id="form-auth" class="stack" novalidate>
          <div class="field">
            <label for="auth-email">Email</label>
            <input
              id="auth-email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="field">
            <label for="auth-password">Password</label>
            <input
              id="auth-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              minlength="6"
            />
          </div>
          <button type="submit" class="btn btn--primary" id="btn-auth-submit">
            Sign in
          </button>
        </form>

        <p class="text-muted" style="margin-top: var(--space-4)">
          <button type="button" class="btn btn--ghost btn--sm" id="btn-toggle-auth-mode">
            Need an account? Sign up
          </button>
        </p>
      </section>

      <!-- Inventory -->
      <section id="view-inventory" hidden>
        <div class="toolbar">
          <p class="text-muted" style="margin: 0">
            Manage your products. Categories and units come from your database catalogue.
          </p>
          <button type="button" class="btn btn--primary" id="btn-add-item">
            Add item
          </button>
        </div>

        <div id="inventory-alert" class="alert alert--error" hidden role="alert"></div>

        <div id="inventory-loading" class="state-block" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <p>Loading inventory…</p>
        </div>

        <div id="inventory-empty" class="state-block" hidden>
          <p>No items yet. Add your first product to get started.</p>
        </div>

        <div id="inventory-error" class="state-block state-block--error" hidden></div>

        <div id="inventory-table-wrap" class="table-wrap" hidden>
          <table class="data-table" aria-label="Inventory items">
            <thead>
              <tr>
                <th scope="col">Code</th>
                <th scope="col">Name</th>
                <th scope="col">Category</th>
                <th scope="col">Qty</th>
                <th scope="col">Status</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog class="modal" id="dialog-item" aria-labelledby="dialog-item-title">
      <form id="form-item" class="stack" style="margin: 0">
        <div class="modal__header">
          <h2 id="dialog-item-title">Add item</h2>
          <button type="button" class="btn btn--ghost btn--sm" id="btn-dialog-close" aria-label="Close">
            ✕
          </button>
        </div>
        <div class="modal__body">
          <div id="form-item-alert" class="alert alert--error" hidden role="alert"></div>
          <div id="form-item-warning" class="alert alert--warning" hidden role="status"></div>

          <input type="hidden" id="item-id" name="id" value="" />

          <div class="form-grid form-grid--2">
            <div class="field" id="field-code">
              <label for="item-code">Product code <span aria-hidden="true">*</span></label>
              <input id="item-code" name="code" type="text" required maxlength="120" autocomplete="off" />
              <span class="field__error" id="err-code" hidden></span>
            </div>
            <div class="field" id="field-barcode">
              <label for="item-barcode">Barcode</label>
              <input id="item-barcode" name="barcode" type="text" maxlength="120" autocomplete="off" />
              <span class="field__error" id="err-barcode" hidden></span>
            </div>
            <div class="field" style="grid-column: 1 / -1" id="field-name">
              <label for="item-name">Name <span aria-hidden="true">*</span></label>
              <input id="item-name" name="name" type="text" required maxlength="200" autocomplete="off" />
              <span class="field__error" id="err-name" hidden></span>
            </div>
            <div class="field" id="field-category">
              <label for="item-category">Category <span aria-hidden="true">*</span></label>
              <select id="item-category" name="category_id" required>
                <option value="">Select category…</option>
              </select>
              <span class="field__error" id="err-category" hidden></span>
            </div>
            <div class="field" id="field-unit">
              <label for="item-unit">Unit of measure <span aria-hidden="true">*</span></label>
              <select id="item-unit" name="unit_id" required>
                <option value="">Select unit…</option>
              </select>
              <span class="field__error" id="err-unit" hidden></span>
            </div>
            <div class="field" id="field-supplier">
              <label for="item-supplier">Supplier</label>
              <input id="item-supplier" name="supplier" type="text" maxlength="500" autocomplete="off" />
            </div>
            <div class="field" id="field-expiry">
              <label for="item-expiry">Expiry date</label>
              <input id="item-expiry" name="expiry_date" type="date" />
            </div>
            <div class="field" id="field-status">
              <label for="item-status">Status <span aria-hidden="true">*</span></label>
              <select id="item-status" name="status" required>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="discontinued">Discontinued</option>
              </select>
            </div>
            <div class="field" id="field-quantity">
              <label for="item-quantity">Quantity <span aria-hidden="true">*</span></label>
              <input id="item-quantity" name="quantity" type="number" step="any" min="0" value="0" required />
              <span class="field__error" id="err-quantity" hidden></span>
            </div>
            <div class="field" id="field-cost">
              <label for="item-cost">Cost price</label>
              <input id="item-cost" name="cost_price" type="number" step="0.0001" min="0" placeholder="Optional" />
              <span class="field__error" id="err-cost" hidden></span>
            </div>
            <div class="field" id="field-selling">
              <label for="item-selling">Selling price</label>
              <input id="item-selling" name="selling_price" type="number" step="0.0001" min="0" placeholder="Optional" />
              <span class="field__error" id="err-selling" hidden></span>
            </div>
          </div>
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--ghost" id="btn-item-cancel">Cancel</button>
          <button type="submit" class="btn btn--primary" id="btn-item-save">Save</button>
        </div>
      </form>
    </dialog>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
