<script>

    let marks = [45, 67, 89, 90, 56];
    let index = 0; //Step 1

    while (index < marks.length) { // Step 2
        let data = marks[index]; //Step 3
        index++; // Step 4

        if (data == 89) {
            continue;
        }

        console.log("Data : ", data);


    }

    console.log("......................................");

    for (let i = 0; i < marks.length; i++) {
        let data = marks[i];
        if (data == 89) {
            continue
        }
        console.log("Data : ", data);
    }

    console.log("Done");

</script>
