<script>
    //Create an array of numbers
    const numbers = [1, 2, 3, 4, 5];

    //Find a number in a traditional way using a loop
    function findNumberTraditional(num) {
        for (let i = 0; i < numbers.length; i++) {
            if (numbers[i] === num) {
                return i; // Return the index of the found number
            }
        }
        return -1;
    }


    const result = findNumberTraditional(3);
    console.log(`Traditional method: Number found at index ${result}`);

    //Find a number using find method
    const foundIndex = numbers.findIndex(number => number === 3);
    console.log(`Find method: Number found at index ${foundIndex}`);
