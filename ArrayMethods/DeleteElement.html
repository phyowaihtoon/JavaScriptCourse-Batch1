<!DOCTYPE html>
<script>


    let numbers = [100,200,300,400,500];

    let num =400;

    console.log("Original Array : ",numbers);


    //syntax arrayName.splice(index,numberOfElements) -> Remove element from array


    let searchIndex = numbers.findIndex( n => n === num);

    numbers.splice(searchIndex,2);

    console.log("After deletion : ",numbers);


</script>
